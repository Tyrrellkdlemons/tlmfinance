# Netlify configuration — The Last Mile · Finance
# This config makes the build pipeline run Initialize / Build / Deploy / Cleanup
# (matching got-mail and erebustk) instead of "Skipped".

[build]
  publish = "."
  command = "node ./scripts/validate.mjs"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = "--no-warnings"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@neondatabase/serverless"]

# Friendly slugs
[[redirects]]
  from = "/plan"
  to = "/index.html#planner"
  status = 301

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 301

[[redirects]]
  from = "/hub"
  to = "/hub.html"
  status = 301

[[redirects]]
  from = "/learn"
  to = "/learn.html"
  status = 301

[[redirects]]
  from = "/watch"
  to = "/watch.html"
  status = 301

[[redirects]]
  from = "/feed"
  to = "/feed.html"
  status = 301

[[redirects]]
  from = "/radio"
  to = "/radio.html"
  status = 301

[[redirects]]
  from = "/media"
  to = "/media.html"
  status = 301

[[redirects]]
  from = "/youtube"
  to = "/media.html"
  status = 301

[[redirects]]
  from = "/resources"
  to = "/index.html#resources"
  status = 301

# Security + PWA headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/src/data/*"
  [headers.values]
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

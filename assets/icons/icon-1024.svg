<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE08A" stop-opacity="1"/>
      <stop offset="55%" stop-color="#DAA520" stop-opacity=".8"/>
      <stop offset="100%" stop-color="#DAA520" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD970"/>
      <stop offset="55%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#8C6810"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#3A2E15"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Sun glow -->
  <circle cx="512" cy="500" r="400" fill="url(#sun)" opacity="0.7"/>

  <!-- Horizon -->
  <ellipse cx="512" cy="660" rx="520" ry="36" fill="#DAA520" opacity=".22"/>

  <!-- Sun disk -->
  <circle cx="512" cy="640" r="180" fill="url(#gold)"/>

  <!-- Road perspective -->
  <polygon points="362,640 662,640 1024,1024 0,1024" fill="url(#road)"/>

  <!-- Lane stripes -->
  <g fill="#DAA520">
    <rect x="500" y="666" width="24" height="56" rx="4"/>
    <rect x="492" y="746" width="40" height="60" rx="4"/>
    <rect x="482" y="832" width="60" height="64" rx="4"/>
    <rect x="468" y="920" width="88" height="72" rx="6"/>
  </g>

  <!-- TLM monogram, gold gradient, top -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', Inter, Arial, sans-serif" font-weight="900" letter-spacing="-12">
    <text x="512" y="320" text-anchor="middle" font-size="220" fill="url(#gold)">TLM</text>
    <text x="512" y="430" text-anchor="middle" font-size="60" fill="#FFD970" letter-spacing="14" font-weight="700">FINANCE</text>
  </g>

  <!-- Subtle gold ring border -->
  <rect x="20" y="20" width="984" height="984" rx="180" ry="180" fill="none" stroke="#DAA520" stroke-width="3" opacity="0.45"/>
</svg>
